name: Deptrac

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  architecture:
    name: Architecture Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts --ignore-platform-req=php

      - name: Run Deptrac
        run: vendor/bin/deptrac analyse --config-file=deptrac.php --no-progress
